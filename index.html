<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Grid</title>
    <style>
:root {
  --cell-size: 110px;
  --gap: 8px;
  --grid-bg: #f6f8fb;
  --cell-bg: #ffffff;
  --cell-border: #cad4e3;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #eef2f7;
  color: #1f2a37;
}

.app {
  max-width: 1400px;
  margin: 24px auto;
  padding: 0 16px 24px;
}

h1 {
  margin-bottom: 8px;
}

.legend {
  margin-top: 0;
  margin-bottom: 16px;
}

.app-controls {
  display: flex;
  align-items: end;
  gap: 8px;
  margin-bottom: 12px;
}


.sheet-title-label {
  display: grid;
  gap: 4px;
  font-size: 0.85rem;
  font-weight: 600;
}

.sheet-title-label input {
  min-width: 220px;
  padding: 6px;
}

.inventory-grid {
  display: grid;
  grid-template-columns: repeat(12, var(--cell-size));
  gap: var(--gap);
  background: var(--grid-bg);
  padding: 12px;
  border-radius: 10px;
  width: max-content;
  border: 1px solid #dde4ef;
}

.grid-cell {
  width: var(--cell-size);
  height: var(--cell-size);
  position: relative;
  background: var(--cell-bg);
  border: 1px solid var(--cell-border);
  border-radius: 6px;
  cursor: pointer;
  color: #243447;
  transition: transform 0.08s ease, background-color 0.12s ease;
}

.grid-cell:hover {
  transform: translateY(-1px);
  background: #f1f6ff;
}

.grid-cell:focus-visible {
  outline: 3px solid #3a78f2;
  outline-offset: 1px;
}

.cell-coordinate {
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  font-weight: 700;
  font-size: 0.85rem;
}

.cell-buttons {
  position: absolute;
  left: 8px;
  right: 8px;
  bottom: 8px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.cell-action {
  border: 1px solid #bdc7d7;
  border-radius: 5px;
  background: #fff;
  font-size: 0.75rem;
  padding: 4px 0;
  cursor: pointer;
}

.lock-toggle {
  position: absolute;
  right: 6px;
  top: 6px;
  z-index: 2;
  width: 24px;
  height: 24px;
  border: 1px solid #97a4ba;
  border-radius: 6px;
  background: #ffffff;
  cursor: pointer;
  line-height: 1;
  font-size: 0.9rem;
}

.lock-toggle.is-locked {
  background: #d2d6de;
  border-color: #7e8798;
}

.grid-cell.is-selected {
  background: #dbe9ff;
  border-color: #7ea4e8;
}

.grid-cell.inactive {
  background: #e1e3e8;
  border-color: #b9bec9;
  color: #7b8090;
}

.grid-cell.inactive:hover {
  transform: none;
  background: #e1e3e8;
}

.grid-cell.inactive .cell-action {
  opacity: 0.55;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(13, 20, 30, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  z-index: 10;
}

.modal {
  width: min(760px, 100%);
  max-height: 90vh;
  overflow: auto;
  background: #fff;
  border-radius: 10px;
  padding: 16px;
  border: 1px solid #d3dcea;
}

.hidden {
  display: none;
}

.edit-form {
  display: grid;
  gap: 8px;
}

.edit-form label {
  display: grid;
  gap: 4px;
  font-size: 0.9rem;
}

.edit-form input,
.edit-form textarea {
  width: 100%;
  padding: 6px;
}

.modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.modal-list {
  margin-top: 12px;
  border-top: 1px solid #dbe2ee;
  padding-top: 10px;
}

.modal-coordinate {
  margin: 0 0 10px;
  font-weight: 700;
}

.item-row {
  border: 1px solid #d2dbea;
  border-radius: 6px;
  padding: 8px;
  margin-bottom: 8px;
  background: #f9fbff;
}


.item-row-actions {
  margin-top: 8px;
}

.item-row-actions button {
  border: 1px solid #b8c5da;
  border-radius: 5px;
  background: #fff;
  font-size: 0.8rem;
  padding: 4px 8px;
  cursor: pointer;
}

</style>
  </head>
  <body>
    <main class="app">
      <h1>Inventory Management Grid</h1>
      <p class="legend">
        Coordinates run from the bottom-left to the top-right and use the first letter of the spreadsheet title.
      </p>

      <section class="app-controls" aria-label="Inventory import/export controls">
        <label class="sheet-title-label">
          Spreadsheet title
          <input id="sheet-title" type="text" value="Inventory" />
        </label>
        <button id="export-csv" type="button">Export CSV</button>
        <button id="import-csv" type="button">Import CSV</button>
        <input id="csv-file-input" type="file" accept=".csv,text/csv" hidden />
      </section>

      <section id="inventory-grid" class="inventory-grid" aria-label="Inventory coordinate grid"></section>
    </main>

    <div id="modal-backdrop" class="modal-backdrop hidden" aria-hidden="true">
      <div id="edit-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
        <h2 id="edit-modal-title">Edit Slot</h2>
        <p id="edit-coordinate" class="modal-coordinate"></p>
        <form id="edit-form" class="edit-form">
          <label>Code <input name="code" required /></label>
          <label>Description <input name="description" /></label>
          <label>Carton <input name="carton" /></label>
          <label>Single <input name="single" /></label>
          <label>Carton Size <input name="cartonSize" /></label>
          <label>Date <input type="date" name="date" /></label>
          <label>Notes <textarea name="notes" rows="3"></textarea></label>
          <div class="modal-actions">
            <button type="submit" id="save-item">Add Item</button>
            <button type="button" id="cancel-item-edit" class="hidden">Cancel Edit</button>
            <button type="button" id="close-edit">Close</button>
          </div>
        </form>
        <div id="edit-items-list" class="modal-list"></div>
      </div>

      <div id="view-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="view-modal-title">
        <h2 id="view-modal-title">View Slot</h2>
        <p id="view-coordinate" class="modal-coordinate"></p>
        <div id="view-items-list" class="modal-list"></div>
        <div class="modal-actions">
          <button type="button" id="close-view">Close</button>
        </div>
      </div>
    </div>

    <script>
const MAX_X = 11;
const MAX_Y = 5;

const grid = document.getElementById("inventory-grid");
const exportCsvButton = document.getElementById("export-csv");
const importCsvButton = document.getElementById("import-csv");
const csvFileInput = document.getElementById("csv-file-input");
const sheetTitleInput = document.getElementById("sheet-title");

const modalBackdrop = document.getElementById("modal-backdrop");
const editModal = document.getElementById("edit-modal");
const viewModal = document.getElementById("view-modal");
const editCoordinateLabel = document.getElementById("edit-coordinate");
const viewCoordinateLabel = document.getElementById("view-coordinate");
const editItemsList = document.getElementById("edit-items-list");
const viewItemsList = document.getElementById("view-items-list");
const editForm = document.getElementById("edit-form");
const saveItemButton = document.getElementById("save-item");
const cancelItemEditButton = document.getElementById("cancel-item-edit");
const closeEditButton = document.getElementById("close-edit");
const closeViewButton = document.getElementById("close-view");

let currentEditCoordinate = null;
let editingItemIndex = null;
let coordinatePrefix = "I";
const inventoryItems = [];

function getCoordinatePrefix() {
  const trimmed = sheetTitleInput.value.trim();
  return (trimmed[0] || "X").toUpperCase();
}

function toCoordinate(x, y) {
  return `${coordinatePrefix}${String(x).padStart(2, "0")}${String(y).padStart(2, "0")}`;
}

function toNumber(value) {
  const parsed = Number(value);
  return Number.isFinite(parsed) ? parsed : 0;
}

function calculateItemTotal(item) {
  return toNumber(item.carton) * toNumber(item.cartonSize) + toNumber(item.single);
}

function updateGridCoordinates() {
  coordinatePrefix = getCoordinatePrefix();

  const cells = grid.querySelectorAll(".grid-cell");
  cells.forEach((cell) => {
    const x = Number(cell.dataset.x);
    const y = Number(cell.dataset.y);
    const nextCoordinate = toCoordinate(x, y);
    const previousCoordinate = cell.dataset.coordinate;

    cell.dataset.coordinate = nextCoordinate;
    cell.setAttribute("aria-label", `Inventory slot ${nextCoordinate}`);
    cell.querySelector(".cell-coordinate").textContent = nextCoordinate;

    inventoryItems.forEach((item) => {
      if (item.coordinate === previousCoordinate) {
        item.coordinate = nextCoordinate;
      }
    });
  });

  if (currentEditCoordinate) {
    const editCell = grid.querySelector(`.grid-cell[data-coordinate="${currentEditCoordinate}"]`);
    if (editCell) {
      currentEditCoordinate = editCell.dataset.coordinate;
      editCoordinateLabel.textContent = currentEditCoordinate;
      renderItemsList(editItemsList, currentEditCoordinate, true);
    }
  }
}

function escapeCsv(value) {
  const raw = String(value ?? "");
  if (raw.includes(",") || raw.includes("\n") || raw.includes('"')) {
    return `"${raw.replace(/"/g, '""')}"`;
  }

  return raw;
}

function parseCsvLine(line) {
  const cells = [];
  let current = "";
  let inQuotes = false;

  for (let index = 0; index < line.length; index += 1) {
    const char = line[index];
    const next = line[index + 1];

    if (char === '"' && inQuotes && next === '"') {
      current += '"';
      index += 1;
      continue;
    }

    if (char === '"') {
      inQuotes = !inQuotes;
      continue;
    }

    if (char === "," && !inQuotes) {
      cells.push(current);
      current = "";
      continue;
    }

    current += char;
  }

  cells.push(current);
  return cells;
}

function getItemsByCoordinate(coordinate) {
  return inventoryItems
    .map((item, index) => ({ ...item, index }))
    .filter((item) => item.coordinate === coordinate);
}

function renderItemsList(target, coordinate, forEdit = false) {
  const items = getItemsByCoordinate(coordinate);

  if (items.length === 0) {
    target.innerHTML = "<p>No items in this slot yet.</p>";
    return;
  }

  const slotTotal = items.reduce((sum, item) => sum + calculateItemTotal(item), 0);

  target.innerHTML = items
    .map(
      (item, idx) => `
      <div class="item-row">
        <strong>Item ${idx + 1}</strong><br />
        <strong>Code:</strong> ${item.code || "-"}<br />
        <strong>Description:</strong> ${item.description || "-"}<br />
        <strong>Carton:</strong> ${item.carton || "-"}<br />
        <strong>Carton Size:</strong> ${item.cartonSize || "-"}<br />
        <strong>Single:</strong> ${item.single || "-"}<br />
        <strong>Total Units:</strong> ${calculateItemTotal(item)}<br />
        <strong>Date:</strong> ${item.date || "-"}<br />
        <strong>Notes:</strong> ${item.notes || "-"}
        ${forEdit ? `<div class="item-row-actions"><button type="button" class="edit-existing-item" data-item-index="${item.index}">Edit Item</button></div>` : ""}
      </div>
    `,
    )
    .join("") + `<p><strong>Slot Total Units:</strong> ${slotTotal}</p>`;
}

function resetEditState() {
  editingItemIndex = null;
  saveItemButton.textContent = "Add Item";
  cancelItemEditButton.classList.add("hidden");
  editForm.reset();
}

function startEditItem(itemIndex) {
  const item = inventoryItems[itemIndex];
  if (!item) {
    return;
  }

  editingItemIndex = itemIndex;
  saveItemButton.textContent = "Update Item";
  cancelItemEditButton.classList.remove("hidden");

  editForm.elements.code.value = item.code || "";
  editForm.elements.description.value = item.description || "";
  editForm.elements.carton.value = item.carton || "";
  editForm.elements.cartonSize.value = item.cartonSize || "";
  editForm.elements.single.value = item.single || "";
  editForm.elements.date.value = item.date || "";
  editForm.elements.notes.value = item.notes || "";
}

function openModal(modal) {
  modalBackdrop.classList.remove("hidden");
  modal.classList.remove("hidden");
}

function closeModals() {
  modalBackdrop.classList.add("hidden");
  editModal.classList.add("hidden");
  viewModal.classList.add("hidden");
  resetEditState();
}

function setCellMode(cell, lockButton, inactive) {
  const actionButtons = cell.querySelectorAll(".cell-action");

  cell.dataset.mode = inactive ? "inactive" : "active";
  cell.classList.toggle("inactive", inactive);
  cell.classList.toggle("is-selected", false);

  lockButton.classList.toggle("is-locked", inactive);
  lockButton.textContent = inactive ? "🔒" : "🔓";
  lockButton.title = inactive ? "Unlock cell" : "Lock cell";
  lockButton.setAttribute("aria-label", inactive ? "Unlock cell" : "Lock cell");

  actionButtons.forEach((button) => {
    button.disabled = inactive;
  });
}

function createCell(x, y) {
  const coordinate = toCoordinate(x, y);

  const cell = document.createElement("div");
  cell.className = "grid-cell";
  cell.dataset.x = String(x);
  cell.dataset.y = String(y);
  cell.dataset.coordinate = coordinate;
  cell.setAttribute("tabindex", "0");
  cell.setAttribute("aria-label", `Inventory slot ${coordinate}`);

  const label = document.createElement("span");
  label.className = "cell-coordinate";
  label.textContent = coordinate;

  const lockButton = document.createElement("button");
  lockButton.type = "button";
  lockButton.className = "lock-toggle";

  const buttonWrap = document.createElement("div");
  buttonWrap.className = "cell-buttons";

  const viewButton = document.createElement("button");
  viewButton.type = "button";
  viewButton.className = "cell-action";
  viewButton.textContent = "View";

  const editButton = document.createElement("button");
  editButton.type = "button";
  editButton.className = "cell-action";
  editButton.textContent = "Edit";

  viewButton.addEventListener("click", (event) => {
    event.stopPropagation();
    viewCoordinateLabel.textContent = cell.dataset.coordinate;
    renderItemsList(viewItemsList, cell.dataset.coordinate);
    openModal(viewModal);
  });

  editButton.addEventListener("click", (event) => {
    event.stopPropagation();
    currentEditCoordinate = cell.dataset.coordinate;
    editCoordinateLabel.textContent = currentEditCoordinate;
    renderItemsList(editItemsList, currentEditCoordinate, true);
    resetEditState();
    openModal(editModal);
  });

  lockButton.addEventListener("click", (event) => {
    event.preventDefault();
    event.stopPropagation();
    const currentlyInactive = cell.dataset.mode === "inactive";
    setCellMode(cell, lockButton, !currentlyInactive);
  });

  cell.addEventListener("click", (event) => {
    if (event.target.closest("button")) {
      return;
    }

    if (cell.dataset.mode === "inactive") {
      return;
    }

    cell.classList.toggle("is-selected");
  });

  buttonWrap.appendChild(viewButton);
  buttonWrap.appendChild(editButton);
  cell.appendChild(label);
  cell.appendChild(lockButton);
  cell.appendChild(buttonWrap);

  setCellMode(cell, lockButton, false);
  return cell;
}

editItemsList.addEventListener("click", (event) => {
  const button = event.target.closest(".edit-existing-item");
  if (!button) {
    return;
  }

  startEditItem(Number(button.dataset.itemIndex));
});

cancelItemEditButton.addEventListener("click", () => {
  resetEditState();
});

editForm.addEventListener("submit", (event) => {
  event.preventDefault();

  if (!currentEditCoordinate) {
    return;
  }

  const formData = new FormData(editForm);
  const nextItem = {
    coordinate: currentEditCoordinate,
    code: formData.get("code")?.toString().trim() || "",
    description: formData.get("description")?.toString().trim() || "",
    carton: formData.get("carton")?.toString().trim() || "",
    cartonSize: formData.get("cartonSize")?.toString().trim() || "",
    single: formData.get("single")?.toString().trim() || "",
    date: formData.get("date")?.toString().trim() || "",
    notes: formData.get("notes")?.toString().trim() || "",
  };

  if (editingItemIndex !== null && inventoryItems[editingItemIndex]) {
    inventoryItems[editingItemIndex] = nextItem;
  } else {
    inventoryItems.push(nextItem);
  }

  renderItemsList(editItemsList, currentEditCoordinate, true);
  resetEditState();
});

closeEditButton.addEventListener("click", closeModals);
closeViewButton.addEventListener("click", closeModals);
modalBackdrop.addEventListener("click", (event) => {
  if (event.target === modalBackdrop) {
    closeModals();
  }
});

sheetTitleInput.addEventListener("input", () => {
  updateGridCoordinates();
});

exportCsvButton.addEventListener("click", () => {
  const header = ["Coordinate", "Code", "Description", "Carton", "Carton Size", "Single", "Total Units", "Date", "Notes"];
  const lines = [header.join(",")];

  inventoryItems.forEach((item) => {
    lines.push([
      escapeCsv(item.coordinate),
      escapeCsv(item.code),
      escapeCsv(item.description),
      escapeCsv(item.carton),
      escapeCsv(item.cartonSize),
      escapeCsv(item.single),
      escapeCsv(calculateItemTotal(item)),
      escapeCsv(item.date),
      escapeCsv(item.notes),
    ].join(","));
  });

  const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;

  const filenameTitle = sheetTitleInput.value.trim() || "inventory";
  link.download = `${filenameTitle.replace(/\s+/g, "-").toLowerCase()}.csv`;
  link.click();
  URL.revokeObjectURL(url);
});

importCsvButton.addEventListener("click", () => {
  csvFileInput.click();
});

csvFileInput.addEventListener("change", async () => {
  const file = csvFileInput.files?.[0];
  if (!file) {
    return;
  }

  const text = await file.text();
  const rows = text.split(/\r?\n/).filter((line) => line.trim().length > 0);
  if (rows.length < 2) {
    return;
  }

  inventoryItems.length = 0;
  for (let index = 1; index < rows.length; index += 1) {
    const columns = parseCsvLine(rows[index]);
    const [coordinate = "", code = "", description = "", carton = "", cartonSize = "", single = "", maybeTotalOrDate = "", maybeDateOrNotes = "", maybeNotes = ""] = columns;

    const hasTotalColumn = columns.length >= 9;
    const date = hasTotalColumn ? maybeDateOrNotes : maybeTotalOrDate;
    const notes = hasTotalColumn ? maybeNotes : maybeDateOrNotes;

    inventoryItems.push({ coordinate, code, description, carton, cartonSize, single, date, notes });
  }

  if (currentEditCoordinate) {
    renderItemsList(editItemsList, currentEditCoordinate, true);
  }

  csvFileInput.value = "";
});

coordinatePrefix = getCoordinatePrefix();
for (let y = MAX_Y; y >= 0; y -= 1) {
  for (let x = 0; x <= MAX_X; x += 1) {
    grid.appendChild(createCell(x, y));
  }
}

</script>
  </body>
</html>
